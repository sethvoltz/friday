name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    # Phase 1+ moved Friday's canonical persistence from SQLite to
    # Postgres (ADR-023). Tests in @friday/daemon, @friday/cli, and
    # @friday/shared use `createTestDb()` from `@friday/shared`'s
    # `test-pg.ts` to spin up a scratch DB per file. That helper calls
    # `pg_isready` and refuses to start without a reachable Postgres.
    # The helper builds its admin URL as
    # `postgresql://${USER}@localhost:5432/postgres` so we set
    # POSTGRES_USER to `runner` (GHA's default user) and use trust auth
    # (no password) to match the local peer-auth setup.
    #
    # NB: started via `docker run` rather than a `services:` block so we
    # can pass the same connection-ceiling flags the e2e / playwright jobs
    # use (`max_connections=200`, sender/slot=20). A `services:` block
    # can't override the container CMD, so it inherited Postgres's DEFAULT
    # `max_connections=100`. Under the unit suite's per-file scratch DBs
    # (each opens a pool + raw LISTEN clients) that 100-connection ceiling
    # was the amplifier behind the 57P01 teardown flakes and the boot
    # timeouts — File A exhausting connections starved File B's spawn.
    # Matching the e2e job's 200/20/20 removes that pressure.

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Start Postgres (raised connection ceiling)
        run: |
          docker run -d --name postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -e POSTGRES_USER=runner \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:18 \
            postgres \
              -c max_wal_senders=20 \
              -c max_replication_slots=20 \
              -c max_connections=200
          # Wait for Postgres to accept connections.
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U runner; then break; fi
            sleep 1
          done

      # `pg_isready` (which `test-pg.ts:assertPgReady()` shells out to)
      # lives on the runner host, not the container. Install the
      # lightweight client-only package so the assertion finds it.
      - name: Install postgres client (for pg_isready)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm build

      - name: Svelte check
        run: pnpm --filter @friday/dashboard check

  lint:
    name: Lint
    runs-on: ubuntu-latest

    # FRI-117: peer of `checks` (svelte-check). Runs eslint flat-config +
    # prettier format-check across the workspace. Build is not required —
    # the initial ruleset deliberately avoids type-aware rules (e.g.
    # @typescript-eslint/no-floating-promises) that would need a
    # parserOptions.project across every package's tsconfig.

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Eslint
        run: pnpm lint

      - name: Prettier
        run: pnpm format:check

  e2e:
    name: E2E (sync harness)
    runs-on: ubuntu-latest

    # Item #50 multi-subprocess suites need Postgres with `wal_level=logical`
    # so zero-cache can set up logical replication. The default `services:`
    # block can't override the container CMD, so we launch Postgres as a
    # manual `docker run` step that passes the wal_level + slot + sender
    # flags as positional args.
    #
    # Gated separately from the unit-test `tests` job because each e2e
    # file spawns daemon + dashboard + zero-cache subprocesses (~7s per
    # file). The full suite is on the order of 30-60s; not worth running
    # on every push of every unrelated PR diff.
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Start Postgres (logical replication enabled)
        run: |
          docker run -d --name postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -e POSTGRES_USER=runner \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:18 \
            postgres \
              -c wal_level=logical \
              -c max_wal_senders=20 \
              -c max_replication_slots=20 \
              -c max_connections=200
          # Wait for Postgres to accept connections.
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U runner; then break; fi
            sleep 1
          done

      - name: Install postgres client (for pg_isready)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: E2E suites (multi-subprocess)
        run: pnpm test:e2e

  playwright:
    name: E2E (Playwright browser)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Start Postgres (logical replication enabled)
        run: |
          docker run -d --name postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -e POSTGRES_USER=runner \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:18 \
            postgres \
              -c wal_level=logical \
              -c max_wal_senders=20 \
              -c max_replication_slots=20 \
              -c max_connections=200
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U runner; then break; fi
            sleep 1
          done

      - name: Install postgres client (for pg_isready)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium + system deps
        run: pnpm --filter @friday/dashboard exec playwright install --with-deps chromium

      - name: Playwright suite (browser-driven round-trip)
        run: pnpm test:playwright

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/dashboard/playwright-report/
          retention-days: 7

  package:
    name: Package (pre-baked tarball smoke)
    # Standard Apple Silicon runner — produces the darwin-arm64 pre-baked tree
    # the release ships, with native addons ABI-matched to the pinned Node.
    # macos-latest is free on public repos; the larger *-xlarge labels are
    # billed and must not be substituted (FRI-146 AC#19).
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      # fnm provisions the pinned Node the bundled `bin/friday` shim execs
      # through (the shim ignores setup-node's PATH and goes via
      # `$(brew --prefix)/bin/fnm`). macos-latest ships Homebrew but not fnm.
      - name: Install fnm
        run: brew install fnm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Prune to the prod tree the tarball bundles. Under the EXACT pinned Node
      # (node-version-file) so the rebuilt native addons match the on-device
      # fnm-provisioned runtime.
      - name: Prune to prod dependencies
        run: pnpm install --prod --frozen-lockfile

      - name: Pack the pre-baked tarball
        id: pack
        run: node packaging/pack.mjs --out "$RUNNER_TEMP/pack-out"

      # Extract to an ABSOLUTE path DIFFERENT from the pack CWD (the §3
      # relocation hazard only surfaces when the runtime tree lives somewhere
      # other than where pnpm installed it). NO on-device `pnpm install`.
      - name: Extract to a relocated tree
        id: relocate
        run: |
          RELOCATED="$RUNNER_TEMP/friday-relocated"
          mkdir -p "$RELOCATED"
          tar -xzf "${{ steps.pack.outputs.tarball }}" -C "$RELOCATED"
          echo "dir=$RELOCATED" >> "$GITHUB_OUTPUT"
          echo "Extracted to $RELOCATED"
          ls -la "$RELOCATED"

      # AC#10 / AC#18: friday --version (via the bundled shim, through fnm)
      # equals the root package.json version; the daemon entry parses;
      # @friday/shared imports from the relocated tree.
      #
      # CRITICAL: the shim is invoked by ABSOLUTE path from a CWD that has NO
      # .node-version ($RUNNER_TEMP, not the tree root). fnm resolves
      # .node-version from the CWD and does NOT walk up parent dirs, so running
      # the shim from inside the tree (which carries .node-version) would mask
      # the real-world PATH-shim invocation a user makes from $HOME. The shim
      # cd's into its own tree before exec'ing fnm; this smoke proves it.
      - name: Smoke — version + daemon entry + shared import
        working-directory: ${{ steps.relocate.outputs.dir }}
        run: |
          TREE="$(pwd)"
          EXPECTED="$(node -e "console.log(require('./package.json').version)")"
          # Provision the pinned Node so the bundled `bin/friday` shim (which
          # execs through fnm) resolves the same version that built the tree.
          fnm install || true
          # Invoke from $RUNNER_TEMP — a dir with NO .node-version — by absolute
          # path, mirroring `$HOME/.local/bin/friday --version` for a real user.
          ACTUAL="$(cd "$RUNNER_TEMP" && "$TREE/bin/friday" --version)"
          echo "friday --version (from a dir with no .node-version) => $ACTUAL (expected $EXPECTED)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::friday --version ($ACTUAL) != root package.json version ($EXPECTED)"
            exit 1
          fi
          node --check services/daemon/dist/index.js
          ( cd services/daemon && node --input-type=module -e "await import('@friday/shared')" )

      # AC#11(a): the dashboard server-entry boots far enough to load the
      # @oxfmt/binding native addon (pulled in transitively via @rocicorp/zero)
      # with no ERR_DLOPEN_FAILED — proves the darwin-arm64 native modules
      # relocate + dlopen cleanly. We import the handler (which pulls the SSR
      # graph including oxfmt) rather than listen on a port.
      - name: Smoke — native addon (dashboard SSR / @oxfmt/binding)
        working-directory: ${{ steps.relocate.outputs.dir }}/services/dashboard
        run: |
          node --input-type=module -e "await import('./build/handler.js'); console.log('dashboard handler + native graph loaded OK')"

      # AC#11(b): zero-cache spawns from the RELOCATED tree via the SAME
      # process.execPath path the supervisor uses (services/dashboard/
      # node_modules/@rocicorp/zero/out/zero/src/cli.js), resolves all its
      # bundled deps (--help), AND its effective resolution carries NO pack-time
      # path. We scrub NODE_PATH and strip the pnpm dir from PATH so a clean
      # `--help` proves resolution came from the relocated node_modules, not a
      # leaked pack-CWD NODE_PATH. Merely importing @friday/shared does NOT
      # satisfy this AC.
      - name: Smoke — zero-cache serves from the relocated tree (no NODE_PATH leak)
        working-directory: ${{ steps.relocate.outputs.dir }}
        env:
          PACK_CWD: ${{ github.workspace }}
        run: |
          ZERO_CLI="services/dashboard/node_modules/@rocicorp/zero/out/zero/src/cli.js"
          if [ ! -f "$ZERO_CLI" ]; then
            echo "::error::relocated zero-cache cli.js missing at $ZERO_CLI"
            exit 1
          fi
          # Spawn exactly as the supervisor does: process.execPath against the
          # relocated cli.js, with NODE_PATH unset so any successful module
          # resolution must have come from the relocated node_modules tree.
          OUT="$(env -u NODE_PATH "$(node -e 'console.log(process.execPath)')" "$ZERO_CLI" --help 2>&1)" || {
            echo "$OUT"
            echo "::error::zero-cache --help failed to resolve its bundled deps from the relocated tree"
            exit 1
          }
          echo "$OUT" | head -20
          # Assert no pack-time CWD path leaked into zero-cache's output/resolution.
          if printf '%s' "$OUT" | grep -qF "$PACK_CWD"; then
            echo "::error::zero-cache output referenced the pack CWD ($PACK_CWD) — NODE_PATH leaked into the relocated tree"
            exit 1
          fi
          echo "zero-cache resolved from the relocated tree with no pack-CWD leak"

      # AC#16: prove the supervisor spawns children with NO pnpm on PATH — argv0
      # is process.execPath, never `pnpm` / a `.bin` shim. We introspect the
      # built buildSpecs() with pnpm removed from PATH and assert every spec's
      # cmd is process.execPath.
      - name: Smoke — supervisor specs spawn via process.execPath (no pnpm)
        working-directory: ${{ steps.relocate.outputs.dir }}
        run: |
          node --input-type=module -e "
            import { buildSpecs } from './packages/cli/dist/bin/supervisor.js';
            const specs = buildSpecs(process.cwd());
            let bad = 0;
            for (const s of specs) {
              if (s.cmd !== process.execPath) {
                console.error('spec', s.name, 'cmd is', s.cmd, '(expected process.execPath)');
                bad++;
              }
              if (s.cmd === 'pnpm' || s.args.some((a) => a === 'exec')) {
                console.error('spec', s.name, 'still routes through pnpm');
                bad++;
              }
            }
            if (bad > 0) process.exit(1);
            console.log('all supervisor child specs spawn via process.execPath');
          "
