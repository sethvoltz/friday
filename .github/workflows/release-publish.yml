name: Release Publish

# Fires when release-please's merged Release PR cuts a GitHub Release. Builds
# the pre-baked, ABI-matched tarball for BOTH darwin arches — arm64 (Apple
# Silicon, primary) on macos-latest and x64 (Intel, legacy) on macos-13 — and
# uploads each as a Release asset alongside its .sha256. The shared VERSION
# asset — the "latest" pointer every installer resolves — is uploaded LAST by a
# separate publish-version job gated on BOTH arches succeeding, so a partial
# release never advertises a version whose tarball is missing for one arch. All
# standard runners are free on public repos; do NOT swap for a *-xlarge label.
#
# Each arch MUST build on a runner of that arch: `pnpm install --prod` fetches
# native prebuilds (@oxfmt/binding, @rocicorp/zero-sqlite3, better-sqlite3,
# sharp) by process.arch, so there is no cross-compile — an arm64 runner can
# only produce an arm64 tree, and vice versa. macos-13 is GitHub's last free
# Intel macOS image; Intel hardware caps out at macOS 26, so no newer Intel
# runner is coming and none is needed — Intel is legacy support, arm64 is the
# permanent primary.
#
# NO formula render, NO GitHub-App token, NO brew-tap push: Friday is
# distributed via install.sh + `friday update` pulling these assets directly
# (FRI-146 / ADR-034). That whole brew-formula publish tail is CUT.
#
# The pre-baked tarball smoke (extract to a relocated tree → version /
# zero-cache / supervisor-spec checks) lives HERE, gating the upload,
# rather than on every PR: the artifact only exists at release time, so that is
# the only place worth validating it. A red smoke fails the job before any asset
# is uploaded, so a broken tarball never reaches a release.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Pack + upload darwin-${{ matrix.arch }} tarball
    # One row per shipped darwin arch, each on a runner of that arch so native
    # addons are ABI-matched to the pinned Node. macos-latest (Apple Silicon)
    # and macos-13 (Intel) are both free on public repos; the larger *-xlarge
    # labels are billed and must not be used. fail-fast off so a failure on one
    # arch still reports the other rather than cancelling it.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # Apple Silicon — primary target
            arch: arm64
          - runner: macos-13 # Intel — legacy support (GitHub's last free Intel image)
            arch: x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      # Pinned to a full commit SHA (not the mutable @v5 tag): this job runs
      # with `contents: write` and produces the exact assets users install via
      # install.sh / `friday update`, so a retagged/compromised third-party
      # action could inject into the published tarball (ADR-034). Dependabot
      # keeps the pin current.
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Prune dev dependencies so the bundled node_modules is the prod tree the
      # tarball ships. Runs under the EXACT pinned Node (node-version-file), so
      # the rebuilt native addons (@oxfmt/binding, @rocicorp/zero-sqlite3,
      # better-sqlite3, sharp) are ABI-matched to the fnm-provisioned runtime.
      - name: Prune to prod dependencies
        run: pnpm install --prod --frozen-lockfile

      - name: Pack the pre-baked tarball
        id: pack
        run: node packaging/pack.mjs --out dist-pack

      # Both macOS runners ship Homebrew but not fnm, which the bundled
      # `bin/friday` shim execs through (it ignores setup-node's PATH and goes
      # via `$(brew --prefix)/bin/fnm` — resolving /opt/homebrew on arm64,
      # /usr/local on Intel). Needed by the version smoke below.
      - name: Install fnm
        run: brew install fnm

      # Extract to an ABSOLUTE path DIFFERENT from the pack CWD — the relocation
      # hazard only surfaces when the runtime tree lives somewhere other than
      # where pnpm installed it. NO on-device pnpm install.
      - name: Extract to a relocated tree
        id: relocate
        run: |
          RELOCATED="$RUNNER_TEMP/friday-relocated"
          mkdir -p "$RELOCATED"
          tar -xzf "${{ steps.pack.outputs.tarball }}" -C "$RELOCATED"
          echo "dir=$RELOCATED" >> "$GITHUB_OUTPUT"
          ls -la "$RELOCATED"

      # friday --version (via the bundled shim, through fnm) equals the root
      # version; the daemon entry parses; @friday/shared imports from the
      # relocated tree. The shim is invoked by ABSOLUTE path from a CWD with NO
      # .node-version, mirroring a real user's $HOME/.local/bin/friday call.
      - name: Smoke — version + daemon entry + shared import
        working-directory: ${{ steps.relocate.outputs.dir }}
        run: |
          TREE="$(pwd)"
          EXPECTED="$(node -e "console.log(require('./package.json').version)")"
          fnm install || true
          ACTUAL="$(cd "$RUNNER_TEMP" && "$TREE/bin/friday" --version)"
          echo "friday --version (no .node-version in CWD) => $ACTUAL (expected $EXPECTED)"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::friday --version ($ACTUAL) != root version ($EXPECTED)"
            exit 1
          fi
          node --check services/daemon/dist/index.js
          ( cd services/daemon && node --input-type=module -e "await import('@friday/shared')" )

      # zero-cache spawns from the relocated tree via the SAME process.execPath
      # path the supervisor uses, resolves its bundled deps (--help), and leaks
      # NO pack-time path (NODE_PATH scrubbed so any resolution must come from
      # the relocated node_modules).
      - name: Smoke — zero-cache serves from the relocated tree (no NODE_PATH leak)
        working-directory: ${{ steps.relocate.outputs.dir }}
        env:
          PACK_CWD: ${{ github.workspace }}
        run: |
          ZERO_CLI="services/dashboard/node_modules/@rocicorp/zero/out/zero/src/cli.js"
          if [ ! -f "$ZERO_CLI" ]; then
            echo "::error::relocated zero-cache cli.js missing at $ZERO_CLI"
            exit 1
          fi
          OUT="$(env -u NODE_PATH "$(node -e 'console.log(process.execPath)')" "$ZERO_CLI" --help 2>&1)" || {
            echo "$OUT"
            echo "::error::zero-cache --help failed to resolve bundled deps from the relocated tree"
            exit 1
          }
          echo "$OUT" | head -20
          if printf '%s' "$OUT" | grep -qF "$PACK_CWD"; then
            echo "::error::zero-cache output referenced the pack CWD ($PACK_CWD) — NODE_PATH leaked"
            exit 1
          fi
          echo "zero-cache resolved from the relocated tree with no pack-CWD leak"

      # sharp loads a SEPARATE native addon (@img/sharp-libvips-darwin-<arch>)
      # from the sqlite addon the zero-cache smoke covers. The daemon requires
      # it on the image-attachment path (@friday/shared/services → attachments →
      # `import sharp`), and the bare `import('@friday/shared')` above does NOT
      # reach it. A wrong/missing per-arch sharp prebuild would otherwise ship
      # green and crash the daemon on the first image upload. Load it from the
      # relocated tree and run a trivial transform so the native libvips binding
      # is actually dlopen'd, not merely resolved.
      - name: Smoke — sharp native addon loads + runs from the relocated tree
        working-directory: ${{ steps.relocate.outputs.dir }}
        run: |
          ( cd packages/shared && node --input-type=module -e "
            const sharp = (await import('sharp')).default;
            const buf = await sharp({ create: { width: 2, height: 2, channels: 3, background: { r: 0, g: 0, b: 0 } } }).png().toBuffer();
            if (!buf || buf.length === 0) { console.error('::error::sharp produced no output'); process.exit(1); }
            console.log('sharp ok (' + buf.length + ' bytes png, arch ' + process.arch + ')');
          " ) || {
            echo '::error::sharp native addon failed to load/run from the relocated tree (per-arch prebuild missing or ABI-mismatched)'
            exit 1
          }

      # Supervisor specs spawn children via process.execPath (never pnpm / a
      # .bin shim) — introspect the built buildSpecs() with pnpm off PATH.
      - name: Smoke — supervisor specs spawn via process.execPath (no pnpm)
        working-directory: ${{ steps.relocate.outputs.dir }}
        run: |
          node --input-type=module -e "
            import { buildSpecs } from './packages/cli/dist/bin/supervisor.js';
            const specs = buildSpecs(process.cwd());
            let bad = 0;
            for (const s of specs) {
              if (s.cmd !== process.execPath) { console.error('spec', s.name, 'cmd is', s.cmd); bad++; }
              if (s.cmd === 'pnpm' || s.args.some((a) => a === 'exec')) { console.error('spec', s.name, 'routes through pnpm'); bad++; }
            }
            if (bad > 0) process.exit(1);
            console.log('all supervisor child specs spawn via process.execPath');
          "

      # Per-arch tarball + its .sha256 from every row. The shared VERSION asset
      # is uploaded LAST, by the separate publish-version job that `needs` this
      # whole matrix — so the "latest" pointer every installer resolves is never
      # advertised until BOTH arch tarballs are present. See that job's comment.
      - name: Upload per-arch release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.pack.outputs.tarball }}" \
            "${{ steps.pack.outputs.sha256_file }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  # VERSION is the single "latest" pointer every consumer resolves FIRST:
  # install.sh:resolve_version and update.ts:resolveLatestVersion both fetch
  # releases/latest/download/VERSION, then fetch the per-arch tarball by name.
  # It MUST NOT appear until every shipped arch's tarball is on the release —
  # otherwise a partial release (one arch's row failed under fail-fast:false)
  # would advertise a version whose tarball 404s for the missing arch, hard-
  # breaking fresh installs + self-update for that arch until the half-release
  # is fixed. Gating VERSION on `needs: [publish]` (which requires ALL matrix
  # legs to succeed) makes a partial release fail SAFE: no VERSION → consumers
  # resolve "no new version yet" rather than a broken one. VERSION is the root
  # package.json version (pack.mjs writes exactly that), so it's re-derived here
  # from the checked-out tag rather than threaded through a matrix artifact.
  publish-version:
    name: Publish shared VERSION (gated on both arches)
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive + upload VERSION
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(jq -r .version package.json)"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "::error::could not read version from package.json"
            exit 1
          fi
          printf '%s\n' "${VERSION}" > VERSION
          gh release upload "${{ github.event.release.tag_name }}" \
            VERSION \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
